<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    display: flex;
    gap: 0px;
    background: red;
    width: 200px;
    height: 100px;
  }
  .window {
    flex: 1;
    background: blue;
  }
  .resizer {
    width: max(0px, 8px);
    margin: 0 calc((0px * -1 - max(0px, 8px)) / 2);
    background: rgba(0, 255, 0, 0.5);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="window"></div>
    <div class="resizer"></div>
    <div class="window"></div>
  </div>
</body>
</html>
